<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .container {
            text-align: center;
        }
        .timer {
            font-size: 72px;
            margin: 20px 0;
            color: #e74c3c;
        }
        .controls button {
            padding: 15px 30px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            min-width: 100px;
            min-height: 44px;
            border: none;
            border-radius: 5px;
            background-color: #2ecc71;
            color: white;
        }
        .controls button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        .counter {
            font-size: 24px;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            .timer {
                font-size: 48px;
            }
            .controls button {
                padding: 20px 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="timer" id="timer">25:00</div>
        <div class="controls">
            <button id="startBtn">Start</button>
            <button id="pauseBtn" disabled>Pause</button>
            <button id="resetBtn">Reset</button>
        </div>
        <div class="counter">
            Pomodoros completed: <span id="counter">0</span>
        </div>
    </div>

    <audio id="alarm" src="https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3" preload="auto"></audio>

    <script>
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const counterDisplay = document.getElementById('counter');
        const alarm = document.getElementById('alarm');

        let timeLeft = 25 * 60; // 25 minutes in seconds
        let timerInterval;
        let isRunning = false;
        let isWorkTime = true;
        let pomodoroCount = localStorage.getItem('pomodoroCount') || 0;

        counterDisplay.textContent = pomodoroCount;

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Change color based on work/break time
            if (isWorkTime) {
                timerDisplay.style.color = '#e74c3c';
                document.body.style.backgroundColor = '#f5f5f5';
            } else {
                timerDisplay.style.color = '#2ecc71';
                document.body.style.backgroundColor = '#e8f8f5';
            }
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        alarm.play();
                        
                        if (isWorkTime) {
                            pomodoroCount++;
                            counterDisplay.textContent = pomodoroCount;
                            localStorage.setItem('pomodoroCount', pomodoroCount);
                            isWorkTime = false;
                            timeLeft = 5 * 60; // 5 minute break
                        } else {
                            isWorkTime = true;
                            timeLeft = 25 * 60; // 25 minute work
                        }
                        
                        setTimeout(() => {
                            startTimer();
                        }, 1000);
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            isWorkTime = true;
            timeLeft = 25 * 60;
            updateDisplay();
            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);

        updateDisplay();
    </script>
</body>
</html>
