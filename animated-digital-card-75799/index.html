<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Digital Card</title>
    <style>
        :root {
            --primary-color: #6200ea;
            --secondary-color: #03dac6;
            --background-color: #f5f5f5;
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            padding: 20px;
            backface-visibility: hidden;
        }

        .card-back {
            transform: rotateY(180deg);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .name-animation {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 2.5s forwards;
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .social-icon:hover::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: ripple 1s linear infinite;
        }

        @keyframes ripple {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .details-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .card {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="card" id="card">
        <div class="card-front">
            <svg width="100%" height="60" viewBox="0 0 300 60">
                <path class="name-animation" fill="none" stroke="var(--primary-color)" stroke-width="2" d="M10,30 Q15,10 25,30 T45,30 T65,30 T85,30 T105,30 T125,30 T145,30 T165,30 T185,30 T205,30 T225,30 T245,30 T265,30 T285,30"/>
                <text x="150" y="40" text-anchor="middle" fill="var(--primary-color)">Your Name</text>
            </svg>
            <div class="social-icons">
                <div class="social-icon">LI</div>
                <div class="social-icon">GH</div>
                <div class="social-icon">TW</div>
            </div>
            <button class="details-btn" id="detailsBtn">Details</button>
        </div>
        <div class="card-back">
            <h2>About Me</h2>
            <p>Professional details and information go here.</p>
            <button class="details-btn" id="backBtn">Back</button>
        </div>
    </div>

    <script>
        document.getElementById('detailsBtn').addEventListener('click', function() {
            document.getElementById('card').classList.add('flipped');
        });

        document.getElementById('backBtn').addEventListener('click', function() {
            document.getElementById('card').classList.remove('flipped');
        });

        // Parallax effect for mobile
        if (window.innerWidth <= 600) {
            window.addEventListener('scroll', function() {
                const card = document.getElementById('card');
                const scrollPosition = window.scrollY;
                card.style.transform = `translateY(${scrollPosition * 0.3}px)`;
            });
        }
    </script>
</body>
</html>",
