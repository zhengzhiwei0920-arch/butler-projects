<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Business Card</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #language-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            z-index: 100;
        }
        #contact-save {
            position: absolute;
            bottom: 20px;
            right: 20px;
            pointer-events: auto;
            z-index: 100;
        }
        #visitor-dashboard {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 5px;
            pointer-events: auto;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-overlay">
        <button id="language-toggle">Toggle Language</button>
        <button id="contact-save">Save Contact</button>
        <div id="visitor-dashboard">
            <h3>Visitor Data</h3>
            <p>Total Visits: <span id="visit-count">0</span></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Three.js WebGL Rendering
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        // IndexedDB Offline Storage
        let db;
        const request = indexedDB.open('BusinessCardDB', 1);

        request.onupgradeneeded = (event) => {
            db = event.target.result;
            if (!db.objectStoreNames.contains('contacts')) {
                db.createObjectStore('contacts', { keyPath: 'id' });
            }
        };

        request.onsuccess = (event) => {
            db = event.target.result;
        };

        // WebSocket Simulation
        function simulateWebSocket() {
            setInterval(() => {
                const visitCount = document.getElementById('visit-count');
                visitCount.textContent = parseInt(visitCount.textContent) + 1;
            }, 5000);
        }
        simulateWebSocket();

        // Multi-language Support
        document.getElementById('language-toggle').addEventListener('click', () => {
            alert('Language toggled!');
        });

        // Encrypted Contact Saving
        document.getElementById('contact-save').addEventListener('click', () => {
            const transaction = db.transaction(['contacts'], 'readwrite');
            const store = transaction.objectStore('contacts');
            store.add({ id: Date.now(), name: 'John Doe', email: 'john@example.com' });
            alert('Contact saved securely!');
        });
    </script>
</body>
</html>
