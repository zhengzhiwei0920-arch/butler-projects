name: Deploy to Tencent CloudBase

on:
  push:
    branches:
      - main  # 监听 main 分支的推送

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install CloudBase CLI
        run: npm i -g @cloudbase/cli

      - name: Deploy to CloudBase Hosting
        env:
          SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          ENV_ID: ${{ secrets.ENV_ID }}
        run: |
          # 登录腾讯云
          tcb login --apiKeyId $SECRET_ID --apiKeySecret $SECRET_KEY
          # 将当前仓库所有内容推送到静态网站根目录
          tcb hosting deploy ./ / -e $ENV_ID
